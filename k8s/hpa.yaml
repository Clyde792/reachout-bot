apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: reachout-bot-hpa
  namespace: reachout
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: reachout-bot
  minReplicas: 2        # Always at least 2 running
  maxReplicas: 10       # Scale up to 10 if needed
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70    # Scale up when CPU hits 70%
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80    # Scale up when memory hits 80%