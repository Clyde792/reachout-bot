apiVersion: apps/v1
kind: Deployment
metadata:
  name: reachout-bot
  namespace: reachout
  labels:
    app: reachout-bot
    version: "1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: reachout-bot
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: reachout-bot
    spec:
      containers:
        - name: reachout-bot
          image: clydelinhtet/reachout-bot:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: reachout-secrets
                  key: TELEGRAM_BOT_TOKEN
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: reachout-secrets
                  key: ANTHROPIC_API_KEY
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: reachout-secrets
                  key: SUPABASE_URL
            - name: SUPABASE_KEY
              valueFrom:
                secretKeyRef:
                  name: reachout-secrets
                  key: SUPABASE_KEY
            # Server-only key that bypasses RLS. optional:true so the pod still
            # starts (falls back to SUPABASE_KEY) until you add this secret key.
            - name: SUPABASE_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: reachout-secrets
                  key: SUPABASE_SERVICE_KEY
                  optional: true
            - name: DASHBOARD_API_KEY
              valueFrom:
                secretKeyRef:
                  name: reachout-secrets
                  key: DASHBOARD_API_KEY
            - name: TWILIO_ACCOUNT_SID
              valueFrom:
                secretKeyRef:
                  name: reachout-secrets
                  key: TWILIO_ACCOUNT_SID
            - name: TWILIO_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: reachout-secrets
                  key: TWILIO_AUTH_TOKEN
            - name: TWILIO_PHONE_NUMBER
              valueFrom:
                secretKeyRef:
                  name: reachout-secrets
                  key: TWILIO_PHONE_NUMBER
            - name: WORKER_PHONE_NUMBER
              valueFrom:
                secretKeyRef:
                  name: reachout-secrets
                  key: WORKER_PHONE_NUMBER
            - name: RAPIDAPI_KEY
              valueFrom:
                secretKeyRef:
                  name: reachout-secrets
                  key: RAPIDAPI_KEY
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
      restartPolicy: Always