# Run this command to create secrets in Kubernetes (never commit real values):
# kubectl create secret generic reachout-secrets \
#   --from-literal=TELEGRAM_BOT_TOKEN=your_token \
#   --from-literal=ANTHROPIC_API_KEY=your_key \
#   --from-literal=SUPABASE_URL=your_url \
#   --from-literal=SUPABASE_KEY=your_key \
#   --from-literal=DASHBOARD_API_KEY=your_key \
#   --from-literal=TWILIO_ACCOUNT_SID=your_sid \
#   --from-literal=TWILIO_AUTH_TOKEN=your_token \
#   --from-literal=TWILIO_PHONE_NUMBER=your_number \
#   --from-literal=WORKER_PHONE_NUMBER=your_number \
#   --from-literal=RAPIDAPI_KEY=your_key \
#   --namespace=reachout
apiVersion: v1
kind: Secret
metadata:
  name: reachout-secrets
  namespace: reachout
type: Opaque
# Values are base64 encoded - use the kubectl command above instead of editing here