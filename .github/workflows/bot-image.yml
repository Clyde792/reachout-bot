name: Build & push bot image

# Builds and pushes the bot image on every change to the bot source.
# Cluster rollout is operator-run (the kind cluster is local):
#   kubectl rollout restart deployment reachout-bot -n reachout
#
# Required repo secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN

on:
  push:
    branches: [ master ]
    paths:
      - 'index.js'
      - 'Dockerfile'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: clydelinhtet/reachout-bot:latest
