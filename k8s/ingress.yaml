apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: reachout-ingress
  namespace: reachout
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  rules:
    - host: reachout-bot.scs.org.sg     # Production domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: reachout-bot-service
                port:
                  number: 80